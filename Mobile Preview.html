<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shota 4.0 — Mobile preview</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:#bdb8ae;font-family:ui-monospace,Menlo,monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:18px;padding:40px 24px 60px}
  h1{font-family:system-ui,sans-serif;font-weight:800;font-size:18px;letter-spacing:.02em;color:#1E1B18;margin:0 0 4px}
  .rail{display:flex;gap:54px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
  .col{display:flex;flex-direction:column;align-items:center;gap:14px}
  .cap{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#34302B}
  /* iPhone bezel */
  .phone{position:relative;width:430px;height:884px;background:#0e0c0b;border-radius:62px;padding:20px;box-shadow:0 30px 70px -20px rgba(20,18,15,.6), inset 0 0 0 2px #2a2725;flex:none}
  .screen{position:relative;width:390px;height:844px;border-radius:44px;overflow:hidden;background:#D6D2CA}
  .screen iframe{width:390px;height:844px;border:0;display:block}
  .notch{position:absolute;top:20px;left:50%;transform:translateX(-50%);width:128px;height:32px;background:#0e0c0b;border-radius:0 0 18px 18px;z-index:5}
  .side{position:absolute;width:3px;background:#2a2725;border-radius:3px}
  .side.l1{left:-3px;top:150px;height:34px}.side.l2{left:-3px;top:210px;height:62px}.side.l3{left:-3px;top:286px;height:62px}
  .side.r1{right:-3px;top:230px;height:96px}
</style>
</head>
<body>
  <h1>Shota 4.0 — on a phone</h1>
  <div class="rail">
    <div class="col">
      <div class="cap">Route</div>
      <div class="phone">
        <div class="notch"></div>
        <span class="side l1"></span><span class="side l2"></span><span class="side l3"></span><span class="side r1"></span>
        <div class="screen"><iframe id="f1" src="Route Page.dc.html" title="Route"></iframe></div>
      </div>
    </div>
    <div class="col">
      <div class="cap">Schedule</div>
      <div class="phone">
        <div class="notch"></div>
        <span class="side l1"></span><span class="side l2"></span><span class="side l3"></span><span class="side r1"></span>
        <div class="screen"><iframe id="f2" src="Schedule Page.dc.html" title="Schedule"></iframe></div>
      </div>
    </div>
  </div>
</body>
</html>
